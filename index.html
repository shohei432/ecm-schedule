// ========== JSONP通信 ==========
function gasGet(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      delete window[cbName]; script.remove(); reject(new Error('timeout'));
    }, 8000);
    window[cbName] = (data) => {
      clearTimeout(timeout); delete window[cbName]; script.remove(); resolve(data);
    };
    params.callback = cbName;
    script.src = GAS_URL + '?' + new URLSearchParams(params).toString();
    script.onerror = () => { clearTimeout(timeout); reject(new Error('error')); };
    document.head.appendChild(script);
  });
}

function switchTab(tab) {
  document.getElementById('tab-btn-winner').classList.toggle('active', tab === 'winner');
  document.getElementById('tab-btn-admin').classList.toggle('active', tab === 'admin');
  document.getElementById('tab-winner').style.display = tab === 'winner' ? 'block' : 'none';
  document.getElementById('tab-admin').style.display = tab === 'admin' ? 'block' : 'none';
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
}

// ========== 当選者ログイン ==========
async function loginWinner() {
  const nick = document.getElementById('nicknameInput').value.trim();
  if (!nick) { showError('loginError', 'ニックネームを入力してください'); return; }
  const winner = WINNERS.find(w => w.nickname.toLowerCase() === nick.toLowerCase());
  if (!winner) { showError('loginError', '該当するニックネームが見つかりませんでした。\nフォーラムのニックネームをご確認ください。'); return; }
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span>確認中...'; btn.disabled = true;
  currentUser = winner;
  document.getElementById('displayNickname').textContent = winner.nickname + ' さん';
  let submission = null;
  let cDates = [];
  try {
    const [subRes, cdRes] = await Promise.all([
      gasGet({ action: 'get', uid: winner.uid }),
      gasGet({ action: 'getCandidateDates' })
    ]);
    if (subRes.success) submission = subRes.data;
    if (cdRes.success) cDates = cdRes.dates || [];
  } catch(e) {}
  candidateDates = cDates;
  renderWinnerForm(winner, submission);
  showPage('winner');
  btn.innerHTML = 'ログイン'; btn.disabled = false;
  document.getElementById('loginError').style.display = 'none';
}

    renderYakinikuForm(winner, submission);
  } else {
    renderDateForm(winner, submission);
  }
}

// 通常の希望日入力フォーム
function renderDateForm(winner, submission) {
  const el = document.getElementById('winnerContent');
  const savedDates = (submission && submission.dates) ? submission.dates : ['','',''];
  const savedComment = (submission && submission.comment) ? submission.comment : '';
  const isUpdate = submission && submission.dates && submission.dates.length > 0;
  dateCounter = savedDates.length;
  const datesHtml = savedDates.map((d,i) => makeDateRow(i, d)).join('');
  el.innerHTML = `<div class="card">
    <div class="prize-badge badge-red">🎁 ${winner.prize}</div>
    ${winner.notes ? `<div style="font-size:0.82rem;color:#888;margin-bottom:8px;">📌 ${winner.notes}</div>` : ''}
    ${isUpdate ? '<div style="display:inline-block;background:#fff3cd;color:#856404;padding:4px 10px;border-radius:12px;font-size:0.78rem;font-weight:bold;margin-bottom:8px;">✏️ 回答済み（変更可）</div>' : ''}
    <div class="note-box">ご都合の良い日程を3つ以上ご入力ください。<br>事務局にて確認後、改めてご連絡いたします。</div>
    <div class="label">希望日程（3つ以上推奨）</div>
    <div id="dateInputs">${datesHtml}</div>
    <button class="add-btn" onclick="addDateInput()">＋ 日程を追加する</button>
    <div class="label">コメント・備考（任意）</div>
    <textarea id="commentInput" placeholder="日程についての補足など">${savedComment}</textarea>
    <button class="btn" id="submitBtn" onclick="submitSchedule()">${isUpdate ? '🔄 日程を更新する' : '📅 希望日程を送信する'}</button>
    <div id="submitResult"></div>
  </div>`;
}

// 焼肉 Yes/No フォーム
function renderYakinikuForm(winner, submission) {
  const el = document.getElementById('winnerContent');
  const savedAnswers = (submission && submission.ynAnswers) ? submission.ynAnswers : {};
  const isUpdate = Object.keys(savedAnswers).length > 0;

  if (!candidateDates || candidateDates.length === 0) {
    el.innerHTML = `<div class="card">
      <div class="prize-badge badge-yakiniku">🎁 ${winner.prize}</div>
      <div class="note-box" style="text-align:center;padding:24px;">
        <p style="font-size:1rem;font-weight:bold;color:#555;">⏳ 事務局が候補日を準備中です</p>
        <p style="margin-top:8px;font-size:0.85rem;">候補日が設定されると、こちらに表示されます。<br>しばらくお待ちください。</p>
      </div>
    </div>`;
    return;
  }

  const datesHtml = candidateDates.map((d, i) => {
    const ans = savedAnswers[d] || '';
    return `<div class="yakiniku-date-item">
      <div class="yakiniku-date-label">📅 ${formatDate(d)}</div>
      <div class="yn-buttons">
        <button class="yn-btn yes ${ans === 'yes' ? 'selected' : ''}" id="yn-yes-${i}" onclick="selectYN(${i}, '${d}', 'yes')">⭕ 参加できる</button>
        <button class="yn-btn no ${ans === 'no' ? 'selected' : ''}" id="yn-no-${i}" onclick="selectYN(${i}, '${d}', 'no')">✕ 参加できない</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="card">
    <div class="prize-badge badge-yakiniku">🎁 ${winner.prize}</div>
    ${isUpdate ? '<div style="display:inline-block;background:#fff3cd;color:#856404;padding:4px 10px;border-radius:12px;font-size:0.78rem;font-weight:bold;margin-bottom:8px;">✏️ 回答済み（変更可）</div>' : ''}
    <div class="note-box">各候補日について「参加できる」「参加できない」をお選びください。<br>事務局にて日程を確定し、改めてご連絡いたします。</div>
    ${datesHtml}
    <div class="label">コメント・備考（任意）</div>
    <textarea id="commentInput" placeholder="参加にあたっての備考など">${(submission && submission.comment) || ''}</textarea>
    <button class="btn" id="submitBtn" onclick="submitYakiniku()">${isUpdate ? '🔄 回答を更新する' : '📅 回答を送信する'}</button>
    <div id="submitResult"></div>
  </div>`;
}

// Yes/No選択
const ynSelections = {};
function selectYN(i, date, val) {
  ynSelections[date] = val;
  const yes = document.getElementById('yn-yes-' + i);
  const no = document.getElementById('yn-no-' + i);
  if (yes && no) {
    yes.className = 'yn-btn yes' + (val === 'yes' ? ' selected' : '');
    no.className = 'yn-btn no' + (val === 'no' ? ' selected' : '');
  }
}

async function submitYakiniku() {
  const comment = document.getElementById('commentInput').value;
  const answeredCount = Object.keys(ynSelections).length;
  if (answeredCount === 0) { showToast('少なくとも1つの日程に回答してください'); return; }
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span>送信中...'; btn.disabled = true;
  try {
    await gasGet({
      action: 'submitYakiniku',
      uid: currentUser.uid,
      nickname: currentUser.nickname,
      shop: currentUser.shop,
      prize: currentUser.prize,
      ynAnswers: JSON.stringify(ynSelections),
      comment
    });
    document.getElementById('submitResult').innerHTML = '<div class="success-box" style="margin-top:12px;"><p>✅ 送信しました！ありがとうございます。</p></div>';
    btn.innerHTML = '🔄 回答を更新する';
  } catch(e) {
    showToast('❌ 送信エラー。時間をおいて再度お試しください。');
    btn.innerHTML = '📅 回答を送信する';
  }
  btn.disabled = false;
}

function makeDateRow(i, val) {
  const today = new Date().toISOString().split('T')[0];
  return `<div class="date-row" id="dr${i}">
    <input type="date" value="${val}" min="${today}">
    <button class="remove-btn" onclick="removeDateRow('dr${i}')">削除</button>
  </div>`;
}
function addDateInput() {
  document.getElementById('dateInputs').insertAdjacentHTML('beforeend', makeDateRow(dateCounter, ''));
  dateCounter++;
}
function removeDateRow(id) {
  if (document.querySelectorAll('.date-row').length > 1) document.getElementById(id) && document.getElementById(id).remove();
}
async function submitSchedule() {
  const dates = [...document.querySelectorAll('#dateInputs input[type=date]')].map(i=>i.value).filter(v=>v);
  if (!dates.length) { showToast('日程を1つ以上入力してください'); return; }
  const comment = document.getElementById('commentInput').value;
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span>送信中...'; btn.disabled = true;
  try {
    await gasGet({ action: 'submit', uid: currentUser.uid, nickname: currentUser.nickname, shop: currentUser.shop, prize: currentUser.prize, dates: dates.join(','), comment });
    document.getElementById('submitResult').innerHTML = '<div class="success-box" style="margin-top:12px;"><p>✅ 送信しました！ありがとうございます。</p></div>';
    btn.innerHTML = '🔄 日程を更新する';
  } catch(e) {
    showToast('❌ 送信エラー。時間をおいて再度お試しください。');
    btn.innerHTML = '📅 希望日程を送信する';
  }
  btn.disabled = false;
}

// ========== 事務局 ==========
async function loginAdmin() {
  const pass = document.getElementById('adminPass').value;
  if (pass !== ADMIN_PASSWORD) { showError('adminError', 'パスワードが違います'); return; }
  document.getElementById('adminError').style.display = 'none';
  showPage('admin');
  await loadAdminData();
}

async function loadAdminData() {
  showToast('📊 データ読み込み中...');
  try {
    const [allRes, cdRes] = await Promise.all([
      gasGet({ action: 'getAll' }),
      gasGet({ action: 'getCandidateDates' })
    ]);
    if (allRes.success) { adminData = allRes.data || {}; }
    if (cdRes.success) { candidateDates = cdRes.dates || []; }
    renderAdminCandidateDates();
    renderAdminList(adminData, currentFilter);
    showToast('✅ データを読み込みました');
  } catch(e) {
    showToast('❌ 読み込みエラー');
    renderAdminList({}, currentFilter);
  }
}

// 事務局：候補日UI
function renderAdminCandidateDates() {
  const el = document.getElementById('adminCandidateDates');
  adminDateCounter = candidateDates.length;
  el.innerHTML = candidateDates.map((d, i) => `
    <div class="admin-date-row" id="adr${i}">
      <input type="date" value="${d}">
      <button class="remove-btn" onclick="removeAdminDate('adr${i}')">削除</button>
    </div>`).join('');
  if (candidateDates.length === 0) {
    el.innerHTML = `<div class="admin-date-row" id="adr0"><input type="date"><button class="remove-btn" onclick="removeAdminDate('adr0')">削除</button></div>`;
    adminDateCounter = 1;
  }
}
function addAdminDate() {
  document.getElementById('adminCandidateDates').insertAdjacentHTML('beforeend',
    `<div class="admin-date-row" id="adr${adminDateCounter}"><input type="date"><button class="remove-btn" onclick="removeAdminDate('adr${adminDateCounter}')">削除</button></div>`);
  adminDateCounter++;
}
function removeAdminDate(id) {
  const rows = document.querySelectorAll('.admin-date-row');
  if (rows.length > 1) document.getElementById(id) && document.getElementById(id).remove();
}
async function saveCandidateDates() {
  const dates = [...document.querySelectorAll('.admin-date-row input[type=date]')].map(i=>i.value).filter(v=>v);
  if (!dates.length) { showToast('候補日を入力してください'); return; }
  try {
    await gasGet({ action: 'saveCandidateDates', dates: dates.join(',') });
    candidateDates = dates;
    showToast('✅ 候補日を保存しました');
  } catch(e) { showToast('❌ 保存エラー'); }
}

function filterWinners(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAdminList(adminData, filter);
}

function formatDate(d) {
  if (!d) return d;
  const s = String(d).substring(0, 10);
  const [y, m, day] = s.split('-');
  const weekdays = ['日','月','火','水','木','金','土'];
  const w = weekdays[new Date(s).getDay()];
  return `${y}年${parseInt(m)}月${parseInt(day)}日（${w}）`;
}

function renderAdminList(data, filter) {
  if (!filter) filter = 'all';
  const total = WINNERS.length;
  const answered = WINNERS.filter(w => {
    const d = data[w.uid];
    if (!d) return false;
    if (w.prize === YAKINIKU_PRIZE) return d.ynAnswers && Object.keys(d.ynAnswers).length > 0;
    return d.dates && d.dates.length > 0;
  }).length;
  const completed = WINNERS.filter(w => data[w.uid] && data[w.uid].completed).length;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item">全当選者 <span>${total}</span>名</div>
    <div class="summary-item">回答済 <span>${answered}</span>名</div>
    <div class="summary-item">調整完了 <span>${completed}</span>名</div>
    <div class="summary-item">未回答 <span>${total - answered}</span>名</div>`;

  const filtered = WINNERS.filter(w => {
    if (filter === 'all') return true;
    if (filter === '未回答') {
      const d = data[w.uid];
      if (!d) return true;
      if (w.prize === YAKINIKU_PRIZE) return !d.ynAnswers || Object.keys(d.ynAnswers).length === 0;
      return !d.dates || !d.dates.length;
    }
    return w.prize.includes(filter);
  });

  document.getElementById('adminList').innerHTML = filtered.map(w => {
    const d = data[w.uid] || {};
    const done = d.completed || false;
    const memo = d.memo || '';
    const isYakiniku = w.prize === YAKINIKU_PRIZE;

    // 回答状態判定
    let hasAnswer = false;
    if (isYakiniku) hasAnswer = d.ynAnswers && Object.keys(d.ynAnswers).length > 0;
    else hasAnswer = d.dates && d.dates.length > 0;

    const badgeHtml = done
      ? `<span class="badge badge-done">✅ 完了</span>`
      : hasAnswer ? `<span class="badge badge-answered">📅 回答あり</span>`
      : `<span class="badge badge-none">未回答</span>`;

    // 回答表示
    let answerHtml = '';
    if (isYakiniku) {
      if (d.ynAnswers && Object.keys(d.ynAnswers).length > 0) {
        answerHtml = Object.entries(d.ynAnswers).map(([date, ans]) =>
          `<span class="${ans === 'yes' ? 'yn-chip-yes' : 'yn-chip-no'}">${formatDate(date)}：${ans === 'yes' ? '⭕ 参加できる' : '✕ 参加できない'}</span>`
        ).join('');
      } else {
        answerHtml = '<div class="no-dates">回答待ち</div>';
      }
    } else {
      answerHtml = (d.dates && d.dates.length)
        ? d.dates.map(dt => `<span class="date-chip">📅 ${formatDate(dt)}</span>`).join('')
        : '<div class="no-dates">希望日程の入力待ち</div>';
    }

    return `<div class="winner-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
        <div>
          <div class="winner-name">${w.nickname}${badgeHtml}</div>
          <div class="winner-shop">${w.shop}</div>
        </div>
        ${w.notes ? `<div style="font-size:0.75rem;color:#888;">${w.notes}</div>` : ''}
      </div>
      <div style="font-size:0.82rem;color:#555;margin-top:6px;">🎁 ${w.prize}</div>
      <div style="margin-top:8px;">${answerHtml}</div>
      ${d.comment ? `<div style="font-size:0.82rem;color:#666;margin-top:6px;">💬 ${d.comment}</div>` : ''}
      <div class="memo-area">
        <textarea id="memo${w.uid}" placeholder="事務局メモ（内部用）">${memo}</textarea>
        <div class="action-row">
          <button class="btn-save-memo" onclick="saveMemo('${w.uid}')">📝 メモ保存</button>
          ${done
            ? `<button class="btn-reopen" onclick="toggleComplete('${w.uid}',false)">↩️ 完了取消</button>`
            : `<button class="btn-complete" onclick="toggleComplete('${w.uid}',true)">✅ 調整完了</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function toggleComplete(uid, val) {
  try {
    await gasGet({ action: 'setCompleted', uid, completed: val });
    if (!adminData[uid]) adminData[uid] = {};
    adminData[uid].completed = val;
    renderAdminList(adminData, currentFilter);
    showToast(val ? '✅ 完了にしました' : '↩️ 完了を取り消しました');
  } catch(e) { showToast('❌ 更新エラー'); }
}

async function saveMemo(uid) {
  const memo = document.getElementById('memo' + uid).value;
  try {
    await gasGet({ action: 'saveMemo', uid, memo });
    if (!adminData[uid]) adminData[uid] = {};
    adminData[uid].memo = memo;
    showToast('📝 メモを保存しました');
  } catch(e) { showToast('❌ 保存エラー'); }
}

function logout() {
  currentUser = null;
  document.getElementById('nicknameInput').value = '';
  document.getElementById('adminPass').value = '';
  showPage('login');
}
function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
