<style>

  .page { display: none; }
  .page.active { display: block; }

  .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; }

  .tab.active { border-color: #e63946; background: #fff5f5; color: #e63946; font-weight: bold; }
  input[type=text], input[type=password], input[type=date], textarea {
    width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
    font-size: 0.95rem; transition: border 0.2s; font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; border-color: #e63946; }
  .btn { width: 100%; padding: 13px; background: #e63946; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
  .btn:hover { background: #c1121f; }
  .btn-secondary { background: #f0f0f0; color: #333; }
  .btn-secondary:hover { background: #e0e0e0; }

  /* 当選者フォーム */
  .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-top: 16px; }

  .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: bold; }
  .status-done { background: #d1e7dd; color: #0f5132; }
  .status-pending { background: #fff3cd; color: #856404; }
  .status-complete { background: #cfe2ff; color: #084298; }
  .label { font-size: 0.85rem; color: #555; margin-bottom: 6px; margin-top: 16px; font-weight: bold; }
  .date-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .date-row input { flex: 1; }
  .remove-btn { background: #f8d7da; color: #842029; border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 0.85rem; }
  .add-btn { background: #f0f0f0; border: none; border-radius: 8px; padding: 10px; cursor: pointer; font-size: 0.85rem; color: #555; margin-top: 4px; width: 100%; }
  .note-box { background: #f8f9fa; border-radius: 8px; padding: 12px; font-size: 0.82rem; color: #555; margin: 12px 0; line-height: 1.6; }
  .already-submitted { background: #d1e7dd; border-radius: 8px; padding: 16px; text-align: center; }
  .already-submitted p { color: #0f5132; font-weight: bold; }

  /* 事務局 */
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn { padding: 6px 14px; border: 1.5px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .filter-btn.active { border-color: #e63946; background: #e63946; color: white; }
  .winner-card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 12px; }
  .winner-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; }
  .winner-name { font-weight: bold; font-size: 1rem; }
  .winner-shop { font-size: 0.8rem; color: #777; margin-top: 2px; }
  .winner-prize { font-size: 0.82rem; color: #555; margin-top: 8px; }
  .dates-list { margin-top: 10px; }
  .date-chip { display: inline-block; background: #e8f4fd; color: #1a6fa6; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; margin: 3px; }
  .no-dates { font-size: 0.82rem; color: #aaa; margin-top: 8px; }
  .complete-btn { background: #198754; color: white; border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; }

  .summary-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }

function saveGasUrl() {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url) { showToast('URLを入力してください'); return; }
  GAS_URL = url;
  localStorage.setItem('gasUrl', url);

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-winner').style.display = tab === 'winner' ? 'block' : 'none';
  document.getElementById('tab-admin').style.display = tab === 'admin' ? 'block' : 'none';
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('id-' + id) && document.getElementById('id-' + id).classList.add('active');
  document.getElementById('page-' + id).classList.add('active');
}

async function loginWinner() {
  const nick = document.getElementById('nicknameInput').value.trim();
  if (!nick) { showError('loginError', 'ニックネームを入力してください'); return; }
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span>確認中...';
  btn.disabled = true;

  const winner = WINNERS.find(w => w.nickname.toLowerCase() === nick.toLowerCase());
  if (!winner) {
    showError('loginError', '該当するニックネームが見つかりませんでした。\nフォーラムのニックネームをご確認ください。');
    btn.innerHTML = 'ログイン'; btn.disabled = false;
    return;
  }

  currentUser = winner;
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('displayNickname').textContent = winner.nickname + ' さん';

  // GASからデータ取得
  let submission = null;
  if (GAS_URL) {
    try {
      const res = await fetch(`${GAS_URL}?action=get&uid=${winner.uid}`);
      const data = await res.json();
      if (data.success) submission = data.data;
    } catch(e) {}
  }
  renderWinnerForm(winner, submission);
  showPage('winner');
  btn.innerHTML = 'ログイン'; btn.disabled = false;
}

    return;

      ${winner.notes ? `<div style="font-size:0.82rem;color:#888;margin-bottom:8px;">📌 ${winner.notes}</div>` : ''}

        事務局にて確認後、改めてご連絡いたします。
      </div>

      <div id="dateInputs">${dateInputs}</div>
      <button class="add-btn" onclick="addDateInput()">＋ 日程を追加する</button>
      <div class="label">コメント・備考（任意）</div>
      <textarea id="commentInput" placeholder="日程についての補足など">${alreadyComment}</textarea>
      <button class="btn" onclick="submitSchedule()" id="submitBtn">
        ${isSubmitted ? '🔄 日程を更新する' : '📅 希望日程を送信する'}
      </button>
      <div id="submitMsg"></div>
    </div>`;
}

function dateRowHtml(i, val) {
  return `<div class="date-row" id="dr${i}">
    <input type="date" value="${val}" min="${new Date().toISOString().split('T')[0]}">
    <button class="remove-btn" onclick="removeDateRow('dr${i}')">削除</button>
  </div>`;
}
let dateCounter = 3;
function addDateInput() {
  const html = dateRowHtml(dateCounter, '');
  document.getElementById('dateInputs').insertAdjacentHTML('beforeend', html);
  dateCounter++;
}
function removeDateRow(id) {
  const el = document.getElementById(id);
  if (el && document.querySelectorAll('.date-row').length > 1) el.remove();
}

async function submitSchedule() {
  const dates = [...document.querySelectorAll('#dateInputs input[type=date]')]
    .map(i => i.value).filter(v => v);
  const comment = document.getElementById('commentInput').value;
  if (dates.length === 0) { showToast('日程を1つ以上入力してください'); return; }

  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span>送信中...'; btn.disabled = true;

  if (!GAS_URL) {
    showToast('⚠️ GAS URLが設定されていません');
    btn.innerHTML = '📅 希望日程を送信する'; btn.disabled = false;
    return;
  }

  try {
    const params = new URLSearchParams({
      action: 'submit',
      uid: currentUser.uid,
      nickname: currentUser.nickname,
      shop: currentUser.shop,
      prize: currentUser.prize,
      dates: dates.join(','),
      comment,
      updatedAt: new Date().toISOString()
    });
    const res = await fetch(GAS_URL + '?' + params.toString(), { method: 'GET' });
    const data = await res.json();
    if (data.success) {
      showToast('✅ 送信しました！');
      document.getElementById('submitMsg').innerHTML = '<div class="already-submitted" style="margin-top:12px;"><p>✅ 送信完了しました。ありがとうございます！</p></div>';
    } else {
      showToast('❌ 送信に失敗しました: ' + data.message);
    }
  } catch(e) {
    showToast('❌ 通信エラーが発生しました');
  }
  btn.innerHTML = '🔄 日程を更新する'; btn.disabled = false;
}

async function loginAdmin() {
  const pass = document.getElementById('adminPass').value;
  if (pass !== ADMIN_PASSWORD) {
    showError('adminError', 'パスワードが違います'); return;
  }
  document.getElementById('adminError').style.display = 'none';
  showPage('admin');
  await loadAdminData();
}

async function loadAdminData() {
  if (!GAS_URL) { showToast('GAS URLを設定してください'); renderAdminList({}); return; }
  try {
    const res = await fetch(`${GAS_URL}?action=getAll`);
    const data = await res.json();
    if (data.success) {
      adminData = data.data || {};
      renderAdminList(adminData);
      showToast('✅ データを読み込みました');
    }
  } catch(e) {
    showToast('❌ データ取得エラー');
    renderAdminList({});
  }
}

function renderAdminList(data, filter = 'all') {
  const list = document.getElementById('adminList');
  const total = WINNERS.length;
  const answered = WINNERS.filter(w => data[w.uid] && data[w.uid].dates && data[w.uid].dates.length > 0).length;
  const completed = WINNERS.filter(w => data[w.uid] && data[w.uid].completed).length;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item">全当選者 <span>${total}</span>名</div>
    <div class="summary-item">回答済 <span>${answered}</span>名</div>
    <div class="summary-item">調整完了 <span>${completed}</span>名</div>
    <div class="summary-item">未回答 <span>${total - answered}</span>名</div>`;

  const filtered = WINNERS.filter(w => {
    if (filter === 'all') return true;
    if (filter === '未回答') return !data[w.uid] || !data[w.uid].dates || data[w.uid].dates.length === 0;
    return w.prize.includes(filter);
  });

  list.innerHTML = filtered.map(w => {
    const d = data[w.uid] || {};
    const dates = d.dates || [];
    const completed = d.completed || false;
    const memo = d.memo || '';
    return `
    <div class="winner-card" id="wc${w.uid}">
      <div class="winner-top">
        <div>
          <div class="winner-name">${w.nickname}
            ${completed ? '<span class="status-badge status-complete" style="margin-left:8px;">✅ 完了</span>' : ''}
            ${!completed && dates.length > 0 ? '<span class="status-badge status-pending" style="margin-left:8px;">📅 回答あり</span>' : ''}
            ${!completed && dates.length === 0 ? '<span class="status-badge" style="background:#f0f0f0;color:#888;margin-left:8px;">未回答</span>' : ''}
          </div>
          <div class="winner-shop">${w.shop}</div>
        </div>
        <div style="font-size:0.78rem;color:#888;">${w.notes || ''}</div>
      </div>
      <div class="winner-prize">🎁 ${w.prize}</div>
      <div class="dates-list">
        ${dates.length > 0
          ? dates.map(d => `<span class="date-chip">📅 ${d}</span>`).join('')
          : '<div class="no-dates">希望日程の入力待ち</div>'}
      </div>
      ${d.comment ? `<div style="font-size:0.82rem;color:#666;margin-top:8px;">💬 ${d.comment}</div>` : ''}
      <div class="memo-area">
        <textarea id="memo${w.uid}" placeholder="事務局メモ（内部用）">${memo}</textarea>
        <button class="save-memo-btn" onclick="saveMemo('${w.uid}')">メモを保存</button>
      </div>
      <div style="margin-top:8px;">
        ${completed
          ? `<button class="reopen-btn" onclick="toggleComplete('${w.uid}', false)">⬅️ 完了を取り消す</button>`
          : `<button class="complete-btn" onclick="toggleComplete('${w.uid}', true)">✅ 調整完了にする</button>`}
      </div>
    </div>`;
  }).join('');
}

function filterWinners(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAdminList(adminData, filter);
}

async function toggleComplete(uid, val) {
  if (!GAS_URL) { showToast('GAS URLを設定してください'); return; }
  try {
    const params = new URLSearchParams({ action: 'setCompleted', uid, completed: val });
    const res = await fetch(GAS_URL + '?' + params.toString());
    const data = await res.json();
    if (data.success) {
      if (!adminData[uid]) adminData[uid] = {};
      adminData[uid].completed = val;
      renderAdminList(adminData);
      showToast(val ? '✅ 完了フラグを立てました' : '⬅️ 完了を取り消しました');
    }
  } catch(e) { showToast('❌ 更新エラー'); }
}

async function saveMemo(uid) {
  const memo = document.getElementById('memo' + uid).value;
  if (!GAS_URL) { showToast('GAS URLを設定してください'); return; }
  try {
    const params = new URLSearchParams({ action: 'saveMemo', uid, memo });
    const res = await fetch(GAS_URL + '?' + params.toString());
    const data = await res.json();
    if (data.success) {
      if (!adminData[uid]) adminData[uid] = {};
      adminData[uid].memo = memo;
      showToast('📝 メモを保存しました');
    }
  } catch(e) { showToast('❌ 保存エラー'); }
}

function logout() {
  currentUser = null;
  document.getElementById('nicknameInput').value = '';
  document.getElementById('adminPass').value = '';
  showPage('login');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}


</script>
</body>
</html>
